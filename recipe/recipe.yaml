# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.7.0"

package:
  name: types-aiobotocore-cloudformation
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/types-aiobotocore-cloudformation/types_aiobotocore_cloudformation-${{ version }}.tar.gz
  sha256: 8dd927a11181dac6b1bc009fb897ded56b2bb4645a83a617dc0afdf677f92315

build:
  number: 1
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}
    - aiobotocore
    - typing_extensions

tests:
  - python:
      imports:
        - types_aiobotocore_cloudformation
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/youtype/mypy_boto3_builder
  summary: Type annotations for aiobotocore.CloudFormation ${{ version }} service generated with mypy-boto3-builder
  license: MIT
  license_file: LICENSE
  documentation: https://youtype.github.io/types_aiobotocore_docs/
  repository: https://github.com/youtype/mypy_boto3_builder

extra:
  recipe-maintainers:
    - vemel
    - fhoehle
